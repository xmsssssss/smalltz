<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置账号密码 - 探针服务端</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
    <style>
        :root {
            --primary: #6ee7ff;
            --primary-strong: #38bdf8;
            --green: #34d399;
            --red: #fb7185;
            --amber: #fbbf24;
            --bg: #0c111d;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-strong: rgba(15, 23, 42, 0.96);
            --line: rgba(148, 163, 184, 0.18);
            --text: #e5eefb;
            --muted: #94a3b8;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 34rem),
                radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.14), transparent 28rem),
                linear-gradient(135deg, #08111f 0%, #0f172a 58%, #111827 100%);
        }

        body.light {
            --bg: #eef5fb;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --line: rgba(15, 23, 42, 0.12);
            --text: #0f172a;
            --muted: #64748b;
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 34rem),
                radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.18), transparent 28rem),
                linear-gradient(135deg, #f8fbff 0%, #edf6ff 55%, #eef2ff 100%);
        }

        .reset-card {
            position: relative;
            width: min(460px, 100%);
            padding: 30px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--panel-strong);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .theme-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 42px;
            min-height: 42px;
            padding: 0;
            border: 1px solid rgba(110, 231, 255, 0.25);
            border-radius: 999px;
            color: var(--text);
            background: rgba(15, 23, 42, 0.48);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
        }

        body.light .theme-btn {
            background: rgba(255, 255, 255, 0.68);
        }

        .theme-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(110, 231, 255, 0.68);
            background: rgba(56, 189, 248, 0.16);
        }

        .brand-badge {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            margin-bottom: 20px;
            border-radius: 18px;
            color: #062334;
            background: linear-gradient(135deg, var(--primary), var(--green));
            font-size: 1.6rem;
            box-shadow: 0 16px 36px rgba(56, 189, 248, 0.26);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 850;
            letter-spacing: -0.04em;
        }

        .subtitle {
            margin: 8px 0 24px;
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.92rem;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 700;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            color: var(--muted);
            transform: translateY(-50%);
        }

        .form-control {
            min-height: 48px;
            padding: 0 14px 0 42px;
            border: 1px solid var(--line);
            border-radius: 16px;
            color: var(--text);
            background: rgba(15, 23, 42, 0.54);
        }

        body.light .form-control {
            background: rgba(255, 255, 255, 0.72);
        }

        .form-control:focus {
            color: var(--text);
            border-color: rgba(110, 231, 255, 0.7);
            background: rgba(15, 23, 42, 0.78);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
        }

        body.light .form-control:focus {
            background: rgba(255, 255, 255, 0.94);
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.68);
        }

        .error-message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(251, 113, 133, 0.34);
            border-radius: 16px;
            color: #fecdd3;
            background: rgba(251, 113, 133, 0.12);
            font-weight: 700;
        }

        .btn {
            min-height: 48px;
            border-radius: 16px;
            font-weight: 850;
        }

        .btn-primary {
            border: none;
            color: #062334;
            background: linear-gradient(135deg, var(--primary), var(--green));
        }

        .btn-primary:hover {
            color: #062334;
            filter: brightness(1.05);
        }

        .btn-secondary {
            border: 1px solid var(--line);
            color: var(--text);
            background: rgba(148, 163, 184, 0.08);
        }

        .btn-secondary:hover {
            border-color: rgba(110, 231, 255, 0.45);
            color: var(--text);
            background: rgba(56, 189, 248, 0.14);
        }

        @media (max-width: 520px) {
            body {
                align-items: start;
                padding: 14px;
            }

            .reset-card {
                padding: 22px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <script>
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    </script>
    <main class="reset-card">
        <button type="button" class="theme-btn" id="theme-toggle" aria-label="切换主题"><i class="bi bi-brightness-high"></i></button>
        <div class="brand-badge"><i class="bi bi-key"></i></div>
        <h1>重置账号密码</h1>
        <p class="subtitle">请输入当前账号密码完成校验，再设置新的管理员账号和密码。</p>
        {% if error %}
        <div class="error-message"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        <form method="POST" action="/reset-password">
            <div class="field">
                <label for="old_username">原账号</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input id="old_username" type="text" name="old_username" class="form-control" placeholder="输入原账号" autocomplete="username" required>
                </div>
            </div>
            <div class="field">
                <label for="old_password">原密码</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input id="old_password" type="password" name="old_password" class="form-control" placeholder="输入原密码" autocomplete="current-password" required>
                </div>
            </div>
            <div class="field">
                <label for="new_username">新账号</label>
                <div class="input-wrap">
                    <i class="bi bi-person-check"></i>
                    <input id="new_username" type="text" name="new_username" class="form-control" placeholder="设置新账号" autocomplete="username" required>
                </div>
            </div>
            <div class="field">
                <label for="new_password">新密码</label>
                <div class="input-wrap">
                    <i class="bi bi-shield-lock"></i>
                    <input id="new_password" type="password" name="new_password" class="form-control" placeholder="设置新密码" autocomplete="new-password" required>
                </div>
            </div>
            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary">确认修改</button>
                <a href="/login" class="btn btn-secondary">返回登录</a>
            </div>
        </form>
    </main>
    <script>
    const themeBtn = document.getElementById('theme-toggle');

    function setTheme(light) {
        document.body.classList.toggle('light', light);
        themeBtn.innerHTML = light ? '<i class="bi bi-moon"></i>' : '<i class="bi bi-brightness-high"></i>';
        localStorage.setItem('theme', light ? 'light' : 'dark');
    }

    if (localStorage.getItem('theme') === 'light') setTheme(true);
    themeBtn.onclick = () => setTheme(!document.body.classList.contains('light'));
    </script>
</body>
</html>
