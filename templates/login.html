<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 探针服务端</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
    <style>
        :root {
            --primary: #6ee7ff;
            --primary-strong: #38bdf8;
            --green: #34d399;
            --red: #fb7185;
            --amber: #fbbf24;
            --bg: #0c111d;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-strong: rgba(15, 23, 42, 0.96);
            --line: rgba(148, 163, 184, 0.18);
            --text: #e5eefb;
            --muted: #94a3b8;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 34rem),
                radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.14), transparent 28rem),
                linear-gradient(135deg, #08111f 0%, #0f172a 58%, #111827 100%);
        }

        body.light {
            --bg: #eef5fb;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --line: rgba(15, 23, 42, 0.12);
            --text: #0f172a;
            --muted: #64748b;
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 34rem),
                radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.18), transparent 28rem),
                linear-gradient(135deg, #f8fbff 0%, #edf6ff 55%, #eef2ff 100%);
        }

        .auth-shell {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 22px;
            align-items: stretch;
        }

        .hero-panel,
        .auth-card {
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero-panel {
            position: relative;
            overflow: hidden;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 520px;
        }

        .hero-panel::after {
            content: '';
            position: absolute;
            right: -80px;
            bottom: -90px;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(110, 231, 255, 0.26), rgba(52, 211, 153, 0.2));
            filter: blur(2px);
        }

        .brand-badge {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            color: #062334;
            background: linear-gradient(135deg, var(--primary), var(--green));
            font-size: 1.6rem;
            box-shadow: 0 16px 36px rgba(56, 189, 248, 0.26);
        }

        .hero-title {
            position: relative;
            z-index: 1;
            max-width: 440px;
        }

        .hero-title h1 {
            margin: 24px 0 12px;
            font-size: clamp(2.1rem, 5vw, 4rem);
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -0.07em;
        }

        .hero-title p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .hero-meta {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .meta-item {
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(148, 163, 184, 0.07);
        }

        .meta-item strong {
            display: block;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .meta-item span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .auth-card {
            position: relative;
            background: var(--panel-strong);
            padding: 30px;
        }

        .theme-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 42px;
            min-height: 42px;
            padding: 0;
            border: 1px solid rgba(110, 231, 255, 0.25);
            border-radius: 999px;
            color: var(--text);
            background: rgba(15, 23, 42, 0.48);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
        }

        body.light .theme-btn {
            background: rgba(255, 255, 255, 0.68);
        }

        .theme-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(110, 231, 255, 0.68);
            background: rgba(56, 189, 248, 0.16);
        }

        .auth-title {
            margin-bottom: 24px;
        }

        .auth-title h2 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 850;
            letter-spacing: -0.04em;
        }

        .auth-title p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 700;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            color: var(--muted);
            transform: translateY(-50%);
        }

        .form-control {
            min-height: 48px;
            padding: 0 14px 0 42px;
            border: 1px solid var(--line);
            border-radius: 16px;
            color: var(--text);
            background: rgba(15, 23, 42, 0.54);
        }

        body.light .form-control {
            background: rgba(255, 255, 255, 0.72);
        }

        .form-control:focus {
            color: var(--text);
            border-color: rgba(110, 231, 255, 0.7);
            background: rgba(15, 23, 42, 0.78);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
        }

        body.light .form-control:focus {
            background: rgba(255, 255, 255, 0.94);
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.68);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 6px 0 18px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .form-check-input {
            border-color: rgba(148, 163, 184, 0.45);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .form-footer a,
        .back-link {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }

        .form-footer a:hover,
        .back-link:hover {
            color: #fff;
        }

        .error-message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(251, 113, 133, 0.34);
            border-radius: 16px;
            color: #fecdd3;
            background: rgba(251, 113, 133, 0.12);
            font-weight: 700;
        }

        .btn {
            min-height: 48px;
            border-radius: 16px;
            font-weight: 850;
        }

        .btn-primary {
            border: none;
            color: #062334;
            background: linear-gradient(135deg, var(--primary), var(--green));
        }

        .btn-primary:hover {
            color: #062334;
            filter: brightness(1.05);
        }

        .btn-secondary {
            border: 1px solid var(--line);
            color: var(--text);
            background: rgba(148, 163, 184, 0.08);
        }

        .btn-secondary:hover {
            border-color: rgba(110, 231, 255, 0.45);
            color: var(--text);
            background: rgba(56, 189, 248, 0.14);
        }

        .mobile-link {
            display: none;
            margin-top: 18px;
            text-align: center;
        }

        @media (max-width: 820px) {
            body {
                align-items: start;
                padding: 14px;
            }

            .auth-shell {
                grid-template-columns: 1fr;
            }

            .hero-panel {
                min-height: auto;
                padding: 22px;
                border-radius: 22px;
            }

            .hero-title h1 {
                margin-top: 16px;
                font-size: 2.2rem;
            }

            .hero-meta {
                display: none;
            }

            .auth-card {
                padding: 22px;
                border-radius: 22px;
            }
        }

        @media (max-width: 460px) {
            .form-footer {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <script>
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    </script>
    <main class="auth-shell">
        <section class="hero-panel">
            <div class="hero-title">
                <div class="brand-badge"><i class="bi bi-activity"></i></div>
                <h1>探针服务端</h1>
                <p>登录后台后可以管理客户端显示状态、删除无效节点，并查看完整上报数据。</p>
            </div>
            <div class="hero-meta">
                <div class="meta-item"><strong>Web</strong><span>状态监控</span></div>
                <div class="meta-item"><strong>WS</strong><span>实时上报</span></div>
                <div class="meta-item"><strong>SQLite</strong><span>本地存储</span></div>
            </div>
        </section>

        <section class="auth-card">
            <button type="button" class="theme-btn" id="theme-toggle" aria-label="切换主题"><i class="bi bi-brightness-high"></i></button>
            <div class="auth-title">
                <h2>管理员登录</h2>
                <p>默认账号密码均为 admin，建议首次登录后修改。</p>
            </div>
            {% if error %}
            <div class="error-message"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="field">
                    <label for="username">账号</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input id="username" type="text" name="username" class="form-control" placeholder="输入管理员账号" autocomplete="username" required>
                    </div>
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input id="password" type="password" name="password" class="form-control" placeholder="输入管理员密码" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="form-footer">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">记住账号</label>
                    </div>
                    <a href="/reset-password">重置账号密码</a>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">进入后台</button>
                    <button type="reset" class="btn btn-secondary">清除输入</button>
                </div>
            </form>
            <div class="mobile-link"><a class="back-link" href="/">返回监控首页</a></div>
        </section>
    </main>
    <script>
    const themeBtn = document.getElementById('theme-toggle');

    function setTheme(light) {
        document.body.classList.toggle('light', light);
        themeBtn.innerHTML = light ? '<i class="bi bi-moon"></i>' : '<i class="bi bi-brightness-high"></i>';
        localStorage.setItem('theme', light ? 'light' : 'dark');
    }

    if (localStorage.getItem('theme') === 'light') setTheme(true);
    themeBtn.onclick = () => setTheme(!document.body.classList.contains('light'));
    </script>
</body>
</html>
